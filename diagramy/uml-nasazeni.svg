<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850">
  <defs>
    <style>
      .bg { fill: #f1f3f5; }
      .title { font: bold 22px Arial, sans-serif; fill: #212529; }
      .node-cube { fill: #dee2e6; stroke: #495057; stroke-width: 2; }
      .face-cube { fill: #e9ecef; stroke: #495057; stroke-width: 2; }
      .comp-box { fill: #e7f5ff; stroke: #1864ab; stroke-width: 2; rx: 4; ry: 4; }
      .db-box { fill: #fff3cd; stroke: #8a6d3b; stroke-width: 2; rx: 4; ry: 4; }
      .header { font: bold 15px Arial, sans-serif; fill: #212529; }
      .text { font: 13px Arial, sans-serif; fill: #343a40; }
      .protocol { font: bold 12px Courier, monospace; fill: #d63301; }
      .conn-line { stroke: #d63301; stroke-width: 2; stroke-dasharray: 4; fill: none; }
    </style>
  </defs>

  <rect width="1400" height="850" class="bg" />
  <text x="40" y="45" class="title">UML Deployment Diagram - Architektura nasazení</text>

  <g transform="translate(60, 160)">
    <polygon points="0,30 30,0 280,0 250,30" class="node-cube" />
    <polygon points="250,30 280,0 280,300 250,330" class="face-cube" />
    <rect y="30" width="250" height="300" fill="#ffffff" stroke="#495057" stroke-width="2" />
    
    <text x="20" y="65" class="header">&lt;&lt;device&gt;&gt;</text>
    <text x="20" y="85" class="header">Klientský prohlížeč</text>
    <text x="20" y="105" class="text" style="font-style: italic;">Smartphony / Tablety / PC</text>
    
    <g transform="translate(20, 140)">
      <rect width="210" height="150" class="comp-box" />
      <text x="15" y="30" class="header">&lt;&lt;component&gt;&gt;</text>
      <text x="15" y="50" class="header">Responsive UI App</text>
      <text x="15" y="80" class="text">• HTML5 / Tailwind CSS</text>
      <text x="15" y="100" class="text">• React SPA framework</text>
      <text x="15" y="120" class="text" style="fill:#1864ab; font-weight:bold;">Splňuje NFR01</text>
    </g>
  </g>

  <g transform="translate(520, 140)">
    <polygon points="0,30 30,0 380,0 350,30" class="node-cube" />
    <polygon points="350,30 380,0 380,350 350,380" class="face-cube" />
    <rect y="30" width="350" height="350" fill="#ffffff" stroke="#495057" stroke-width="2" />

    <text x="20" y="65" class="header">&lt;&lt;execution environment&gt;&gt;</text>
    <text x="20" y="85" class="header">Cloud API Application Server</text>
    <text x="20" y="105" class="text" style="font-style: italic;">Docker container na Render.com</text>

    <g transform="translate(20, 130)">
      <rect width="310" height="100" class="comp-box" />
      <text x="15" y="25" class="header">&lt;&lt;component&gt;&gt;</text>
      <text x="15" y="45" class="header">Backend API (Node.js/Python)</text>
      <text x="15" y="75" class="text">• Implementace FR01 až FR13, RBAC</text>
    </g>

    <g transform="translate(20, 250)">
      <rect width="310" height="100" class="comp-box" style="fill:#e3fafc; stroke:#0c8599;" />
      <text x="15" y="25" class="header">&lt;&lt;component&gt;&gt;</text>
      <text x="15" y="45" class="header">Swiss Pairing Engine</text>
      <text x="15" y="75" class="text" style="fill:#0c8599; font-weight:bold;">• Rychlé generování kol (NFR02)</text>
    </g>
  </g>

  <g transform="translate(1040, 160)">
    <polygon points="0,30 30,0 310,0 280,30" class="node-cube" />
    <polygon points="280,30 310,0 310,300 280,330" class="face-cube" />
    <rect y="30" width="280" height="300" fill="#ffffff" stroke="#495057" stroke-width="2" />

    <text x="20" y="65" class="header">&lt;&lt;device&gt;&gt;</text>
    <text x="20" y="85" class="header">Database Server</text>
    <text x="20" y="105" class="text" style="font-style: italic;">Managed Supabase Cloud</text>

    <g transform="translate(20, 140)">
      <rect width="240" height="140" class="db-box" />
      <text x="15" y="30" class="header">&lt;&lt;database&gt;&gt;</text>
      <text x="15" y="50" class="header">PostgreSQL 16 RDBMS</text>
      <text x="15" y="80" class="text">• Schéma entit z diagramu data</text>
      <text x="15" y="100" class="text">• Rychlé indexy nad tabulkami</text>
    </g>
  </g>

  <path d="M 310 340 L 520 340" class="conn-line" />
  <text x="350" y="325" class="protocol">HTTPS / TLS 1.3</text>
  <text x="365" y="360" class="text">(REST, JSON)</text>

  <path d="M 870 320 L 1040 320" class="conn-line" />
  <text x="900" y="305" class="protocol">PostgreSQL Conn</text>
  <text x="925" y="340" class="text">(SSL Port 5432)</text>
</svg>
